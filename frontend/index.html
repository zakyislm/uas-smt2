<!DOCTYPE html>
<html lang="id">

<head>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const showErr = function() {
                const errDiv = document.createElement('div');
                errDiv.style.position = 'fixed';
                errDiv.style.top = '0';
                errDiv.style.left = '0';
                errDiv.style.width = '100%';
                errDiv.style.background = '#3d0a0a';
                errDiv.style.color = '#ffb4ab';
                errDiv.style.padding = '20px';
                errDiv.style.zIndex = '999999';
                errDiv.style.fontFamily = 'monospace';
                errDiv.style.fontSize = '14px';
                errDiv.style.whiteSpace = 'pre-wrap';
                errDiv.style.boxSizing = 'border-box';
                errDiv.innerHTML = '<h3>[Error] Client-side Error Detected</h3>' +
                                   '<b>Message:</b> ' + message + '<br>' +
                                   '<b>Source:</b> ' + source + '<br>' +
                                   '<b>Line:</b> ' + lineno + ' | <b>Col:</b> ' + colno + '<br>' +
                                   (error && error.stack ? '<b>Stack:</b><br>' + error.stack : '');
                document.body.appendChild(errDiv);
            };
            if (document.body) showErr();
            else window.addEventListener('DOMContentLoaded', showErr);
            return false;
        };
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
